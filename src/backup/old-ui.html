<div class="app">
  <div class="sidebar">
    <h2>Rooms</h2>
  </div>

  <div class="users-panel">
    <h3>Online Users</h3>
    <ul id="onlineUsers"></ul>
  </div>

  <div class="chat-section">
    <div class="chat-header">
      <h2>Socket.IO Chat</h2>
      <div class="join-area">
        <input type="text" id="usernameInput" placeholder="Enter username" />
        <button onclick="joinRoom()">
          Join Room
        </button>
      </div>
    </div>
    <div class="message-container">
      <div id="messages"></div>
      <p id="typingIndicator"></p>
    </div>
    <div class="message-area">
      <input type="text" id="messageInput">
      <button onClick="sendMessage()">
        Send
      </button>
    </div>

    <div class="dm-area">
      <div class="dm-header">
        <h2>Direct Messages</h2>
      </div>

      <input type="text" id="dmUserInput" placeholder="Recipient username" />

      <input type="text" id="dmMessageInput" placeholder="Private message" />

      <button onclick="sendPrivateMessage()">
        Send DM
      </button>
    </div>
  </div>
</div>

<div class="join-area">

  <input type="text" id="usernameInput" placeholder="Enter username" />

  <button onclick="joinRoom()">
    Join
  </button>

</div>
